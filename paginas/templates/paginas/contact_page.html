{% extends 'base.html' %}
{% load wagtailcore_tags %}

{% block content %}
<h1>{{ page.title }}</h1>

{% if page.intro %}
    {{ page.intro|richtext }}
{% endif %}

{% if messages %}
    <div class="success">
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    </div>
{% endif %}

<form action="{% pageurl page %}" method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Enviar</button>
</form>
{% endblock %}
