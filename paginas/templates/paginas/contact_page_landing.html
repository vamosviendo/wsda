{% extends 'base.html' %}
{% load static wagtailcore_tags %}

{% block extra_css %}
<link rel="stylesheet" type="text/css" href="{% static 'css/paginas.css' %}">
<link rel="stylesheet" type="text/css" href="{% static 'css/contact_page.css' %}">
{% endblock %}

{% block content %}
<h2 class="page-titulo">{{ page.title }}</h2>

<div class="success">
    {{ page.thank_you_text|richtext }}
</div>

<p><a class="volver-link" href="{% pageurl page %}">Volver al formulario</a></p>
{% endblock %}
